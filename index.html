<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Semplice</title>

<style>
body{
  font-family: Arial;
  background:#f4f6fb;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

h1{margin-top:0}

input,select,button{
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  background:#2563eb;
  color:white;
  border:none;
  cursor:pointer;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td,th{
  padding:10px;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>💰 Budget Mensile</h1>

<label>Stipendio</label>
<input id="salary" type="number"><br><br>

<label>Entrate extra</label>
<input id="extra" type="number"><br><br>

<button onclick="saveData()">Salva</button>
</div>

<div class="card">
<h2>➕ Aggiungi spesa</h2>

<input id="desc" placeholder="Descrizione">
<input id="amount" type="number" placeholder="€">

<button onclick="addExpense()">Aggiungi</button>
</div>

<div class="card">
<h2>📊 Riepilogo</h2>

<p><b>Entrate:</b> <span id="income">0</span> €</p>
<p><b>Spese:</b> <span id="expenses">0</span> €</p>
<p><b>Rimanente:</b> <span id="remaining">0</span> €</p>
</div>

<div class="card">
<h2>📋 Spese</h2>

<table>
<thead>
<tr>
<th>Descrizione</th>
<th>€</th>
<th></th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("budget")) || {
  salary:0,
  extra:0,
  expenses:[]
};

function saveData(){
  data.salary = Number(document.getElementById("salary").value);
  data.extra = Number(document.getElementById("extra").value);

  save();
  render();
}

function addExpense(){
  const desc = document.getElementById("desc").value;
  const amount = Number(document.getElementById("amount").value);

  if(!desc || amount<=0) return;

  data.expenses.push({desc,amount});

  document.getElementById("desc").value="";
  document.getElementById("amount").value="";

  save();
  render();
}

function deleteExpense(i){
  data.expenses.splice(i,1);
  save();
  render();
}

function save(){
  localStorage.setItem("budget", JSON.stringify(data));
}

function render(){

  document.getElementById("salary").value = data.salary;
  document.getElementById("extra").value = data.extra;

  let totalExpenses = data.expenses.reduce((s,e)=>s+e.amount,0);
  let income = data.salary + data.extra;
  let remaining = income - totalExpenses;

  document.getElementById("income").innerText = income;
  document.getElementById("expenses").innerText = totalExpenses;
  document.getElementById("remaining").innerText = remaining;

  let html="";
  data.expenses.forEach((e,i)=>{
    html += `
      <tr>
        <td>${e.desc}</td>
        <td>${e.amount}</td>
        <td><button onclick="deleteExpense(${i})">X</button></td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;
}

render();

</script>

</body>
</html>
